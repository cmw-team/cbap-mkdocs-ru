# This file configures the Russian help to be build as Web/help/ru
# But it does not copy the dependencies

INHERIT: mkdocs_common.yml

site_name: Comindware Platform. База знаний

docs_dir: docs/ru

site_dir: compiled_help

plugins:
  with-pdf:
    toc_title: Оглавление

markdown_extensions:
  toc:
    title: На этой странице
    permalink_title: Скопируйте адрес этой ссылки, чтобы поделиться параграфом
  pymdownx.keys:
    key_map: { "enter": "Ввод", "space": "Пробел" }

copyright: '<a href="https://www.comindware.ru/" target="_blank">© 2009–2026 Comindware<sup>®</sup></a>. Тема: '

extra:
  kbSite: https://kb.comindware.ru/index.php?ln=ru
  kbArticleURLPrefix: https://kb.comindware.ru/article.php?id=
  kbCategoryURLPrefix: https://kb.comindware.ru/category.php?id=
  pdf:
    # Plain-text default for PDF right-side footers.
    copyright: © Comindware, 2009–2026
    frontpage:
      logo: assets/images/comindware_logo.svg
      headerRight: comindware.ru
      footerLeft: Опубликовано 25.06.2026
      # footerRight defaults to pdf.copyright; set literal text to override.
    pageFooter:
      left: ""
      # right defaults to pdf.copyright; set literal text to override.
